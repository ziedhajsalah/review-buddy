name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - name: Install (backend)
        run: bun install --frozen-lockfile
      - name: Install (UI)
        run: bun install --frozen-lockfile --cwd src/ui
      # verify:ci ends with verify:dist-fresh: after build:ui rebuilds the
      # committed viewer (plan 016), it fails if src/ui/dist drifted from git —
      # i.e. a PR changed UI source without committing the rebuilt artifact.
      - name: Verify (tests + typechecks + UI build + committed-viewer freshness)
        run: bun run verify:ci
